var CATS=[{id:"prato",label:"Pratos",ico:"🍛"},{id:"tortas",label:"Tortas",ico:"🥧"},{id:"salada",label:"Saladas",ico:"🥗"},{id:"lanches",label:"Lanches",ico:"🥪"},{id:"salgados",label:"Salgados",ico:"🧀"},{id:"sobremesa",label:"Sobremesas",ico:"🍮"},{id:"bebidas",label:"Bebidas",ico:"🧃"},{id:"drinks",label:"Drinks",ico:"🍹"},{id:"cerveja",label:"Cervejas",ico:"🍺"}];
function diaSemana(){return new Date().getDay();}
function estaAberto(horarios,fechManual){
  if(fechManual)return false;
  if(!horarios)return true;
  var hn=horarios[diaSemana()];if(!hn||!hn.aberto)return false;
  if(!hn.abre||!hn.fecha)return true;
  var now=new Date();var cur=now.getHours()*60+now.getMinutes();
  function mins(s){var p=(s||"").split(":");return (parseInt(p[0])||0)*60+(parseInt(p[1])||0);}
  return cur>=mins(hn.abre)&&cur<=mins(hn.fecha);
}

  if(view==="done"&&pedido)return h(Acompanhar,{pedido:pedido,mesa:mesa,onVoltar:function(){setView("menu");setPedido(null);},nota:nota,setNota:setNota,avaliado:avaliado,setAvaliado:setAvaliado});

  if(view==="cart")return h(Checkout,{cart:cart,total:total,cli:cli,setCli:setCli,mesa:mesa,add:add,rem:rem,sobremesas:sobremesas,prods:ativos,onAddProd:add,onBack:function(){setView("menu");},onFinalizar:finalizar,enviando:enviando,aberto:aberto});
